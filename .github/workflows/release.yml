name: Release to Google Play

on:
  # Manual trigger with confirmation
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.2)'
        required: true
        type: string
      confirm_release:
        description: 'Type "RELEASE" to confirm deployment to Google Play'
        required: true
        type: string
      track:
        description: 'Deployment track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
  
  # Automatic trigger on release tags (builds AAB but requires approval to deploy)
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Only match semantic versioning like v1.0.2

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '17'

jobs:
  # ===========================================
  # Job 1: Validate Changelog Strings
  # ===========================================
  validate-changelog:
    name: Validate Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version_code: ${{ steps.version.outputs.code }}
      version_name: ${{ steps.version.outputs.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          # Get version from tag or workflow input
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          
          echo "name=$TAG" >> $GITHUB_OUTPUT
          # Convert 1.0.2 to 1_0_2 for string resource name
          SANITIZED=$(echo $TAG | tr '.' '_')
          echo "code=$SANITIZED" >> $GITHUB_OUTPUT
          echo "📦 Version: $TAG (string key: whats_new_v$SANITIZED)"

      - name: Check changelog string exists
        run: |
          VERSION_CODE=${{ steps.version.outputs.code }}
          STRING_KEY="whats_new_v${VERSION_CODE}"
          
          echo "🔍 Looking for required release-note strings: $STRING_KEY"

          for file in app/src/main/res/values/strings.xml app/src/main/res/values-de/strings.xml; do
            if grep -q "name=\"$STRING_KEY\"" "$file"; then
              echo "✅ Found $STRING_KEY in $file"
            else
              echo "❌ ERROR: Missing $STRING_KEY in $file"
              echo ""
              echo "Please add the following string and update WhatsNewDialog.kt if needed:"
              echo "  <string name=\"$STRING_KEY\">• Your changelog here</string>"
              exit 1
            fi
          done

      - name: Verify string in all locales
        run: |
          VERSION_CODE=${{ steps.version.outputs.code }}
          STRING_KEY="whats_new_v${VERSION_CODE}"
          MISSING=""
          
          for locale_dir in app/src/main/res/values-*/; do
            locale=$(basename $locale_dir)
            if [ -f "$locale_dir/strings.xml" ]; then
              if ! grep -q "name=\"$STRING_KEY\"" "$locale_dir/strings.xml"; then
                MISSING="$MISSING $locale"
              fi
            fi
          done
          
          if [ -n "$MISSING" ]; then
            echo "⚠️ WARNING: $STRING_KEY missing in:$MISSING"
            echo "Consider adding translations for these locales."
          else
            echo "✅ All locales have $STRING_KEY"
          fi

  # ===========================================
  # Job 2: Build Signed AAB
  # ===========================================
  build-release:
    name: Build Release AAB
    needs: validate-changelog
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Quick code quality checks before building release
      - name: Run Android Lint
        run: ./gradlew --build-cache lintRelease

      - name: Run Unit Tests
        run: ./gradlew --build-cache testReleaseUnitTest

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload.keystore
          echo "✅ Keystore created at $(pwd)/upload.keystore"

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << EOF
          storeFile=upload.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build Release AAB
        run: ./gradlew --build-cache --configuration-cache bundleRelease

      - name: Validate release bundle safety
        run: |
          set -euo pipefail

          AAB_PATH=$(find app/build/outputs/bundle/release -maxdepth 1 -name '*.aab' | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            echo "❌ No release AAB found"
            exit 1
          fi

          echo "🔍 Inspecting $AAB_PATH"
          jarsigner -verify -certs "$AAB_PATH" > /dev/null

          python - "$AAB_PATH" <<'PY'
          import re
          import sys
          import zipfile
          from pathlib import Path

          aab_path = Path(sys.argv[1])
          forbidden_entry_patterns = [r"upload\.keystore", r"keystore\.properties"]
          forbidden_markers = [
              "com.davy.debug",
              "com.davy.debug.addressbook",
              "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON",
              "KEYSTORE_PASSWORD",
              "KEY_PASSWORD",
              "storePassword=",
          ]
          excluded_from_content_scan = {
              "BUNDLE-METADATA/com.android.tools.build.obfuscation/proguard.map",
          }

          with zipfile.ZipFile(aab_path) as bundle:
              names = [entry.filename for entry in bundle.infolist()]

              for name in names:
                  if any(re.search(pattern, name) for pattern in forbidden_entry_patterns):
                      raise SystemExit(f"Sensitive signing file leaked into the release AAB: {name}")

              if "BUNDLE-METADATA/com.android.tools.build.obfuscation/proguard.map" in names:
                  print("ℹ️ Obfuscation metadata is embedded in the AAB; keep GitHub release asset upload disabled.")

              for entry in bundle.infolist():
                  if entry.is_dir() or entry.filename in excluded_from_content_scan:
                      continue

                  content = bundle.read(entry).decode("latin-1", errors="ignore")
                  for marker in forbidden_markers:
                      if marker in content:
                          raise SystemExit(
                              f"Forbidden marker '{marker}' found in {entry.filename}"
                          )

          print("✅ Release AAB passed signature and secret scans for Play upload")
          PY

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload Mapping File
        uses: actions/upload-artifact@v4
        with:
          name: mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 90

  # ===========================================
  # Job 3: Deploy to Google Play
  # ===========================================
  deploy-google-play:
    name: Deploy to Google Play
    needs: [validate-changelog, build-release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    # Only run if:
    # 1. Manual dispatch with "RELEASE" confirmation, OR
    # 2. Tag push
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_release == 'RELEASE') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Verify release confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm_release }}" != "RELEASE" ]; then
            echo "❌ Release not confirmed. You must type 'RELEASE' to deploy."
            exit 1
          fi
          echo "✅ Release confirmed for ${{ github.event.inputs.track }} track"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download AAB Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: ./aab

      - name: Download Mapping File
        uses: actions/download-artifact@v4
        with:
          name: mapping
          path: ./mapping

      - name: Generate localized release notes
        id: notes
        env:
          VERSION: ${{ needs.validate-changelog.outputs.version_name }}
        run: |
          set -euo pipefail

          python <<'PY'
          import os
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          version = os.environ["VERSION"]
          string_key = f"whats_new_v{version.replace('.', '_')}"

          def extract_version_block(lines: list[str]) -> list[str]:
            in_version = False
            block: list[str] = []
            header_pattern = re.compile(rf"^## \[{re.escape(version)}\] - ")
            for line in lines:
              if header_pattern.match(line):
                in_version = True
                continue
              if in_version and line.startswith("## ["):
                break
              if in_version:
                block.append(line)
            if not block:
              raise SystemExit(f"Missing changelog section for {version}")
            return block

          def extract_tagged_notes(block: list[str], tag: str) -> str:
            start = f"<{tag}>"
            end = f"</{tag}>"
            in_tag = False
            notes: list[str] = []
            for line in block:
              stripped = line.strip()
              if stripped == start:
                in_tag = True
                continue
              if stripped == end:
                break
              if in_tag:
                if stripped.startswith("### "):
                  continue
                if stripped:
                  notes.append(line)
            text = "\n".join(notes).strip()
            if not text:
              raise SystemExit(f"Missing {tag} release notes for {version}")
            return text

          def decode_android_string(text: str) -> str:
            return (
              text.replace("\\n", "\n")
              .replace('\\"', '"')
              .replace("\\'", "'")
              .replace("\\@", "@")
              .replace("\\?", "?")
              .strip()
            )

          def extract_android_string(path: str) -> str:
            root = ET.parse(path).getroot()
            for node in root.findall("string"):
              if node.attrib.get("name") == string_key:
                value = "".join(node.itertext())
                if not value:
                  raise SystemExit(f"Empty string {string_key} in {path}")
                decoded = decode_android_string(value)
                if len(decoded) > 500:
                  raise SystemExit(f"{path} {string_key} exceeds 500 characters after decoding")
                return decoded
            raise SystemExit(f"Missing string {string_key} in {path}")

          changelog_lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          block = extract_version_block(changelog_lines)
          en_changelog = extract_tagged_notes(block, "en-US")
          de_changelog = extract_tagged_notes(block, "de-DE")
          en_whats_new = extract_android_string("app/src/main/res/values/strings.xml")
          de_whats_new = extract_android_string("app/src/main/res/values-de/strings.xml")

          output_root = Path("build/release-notes")
          play_dir = output_root / "play"
          play_dir.mkdir(parents=True, exist_ok=True)

          (play_dir / "whatsnew-en-US").write_text(en_whats_new + "\n", encoding="utf-8")
          (play_dir / "whatsnew-de-DE").write_text(de_whats_new + "\n", encoding="utf-8")

          github_body = output_root / "github_release.md"
          github_body.write_text(
              "## What's New (English)\n\n"
              f"{en_changelog}\n\n"
              "## Neu in dieser Version (Deutsch)\n\n"
              f"{de_changelog}\n\n"
              "---\n"
              "Release bundle is uploaded to Google Play and kept as a workflow artifact only.\n"
              "Full changelog: CHANGELOG.md\n",
              encoding="utf-8",
          )
          PY

          echo "github_body=build/release-notes/github_release.md" >> $GITHUB_OUTPUT
          echo "play_notes_dir=build/release-notes/play" >> $GITHUB_OUTPUT

          echo "📝 GitHub release body:"
          cat build/release-notes/github_release.md
          echo ""
          echo "🛒 Play what's new files:"
          ls -1 build/release-notes/play

      - name: Determine deployment track
        id: track
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "track=${{ github.event.inputs.track }}" >> $GITHUB_OUTPUT
          else
            echo "track=internal" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.davy
          releaseFiles: ./aab/*.aab
          track: ${{ steps.track.outputs.track }}
          releaseName: DAVy v${{ needs.validate-changelog.outputs.version_name }}
          status: draft
          whatsNewDirectory: ${{ steps.notes.outputs.play_notes_dir }}
          mappingFile: ./mapping/mapping.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-changelog.outputs.version_name }}
          target_commitish: ${{ github.sha }}
          name: DAVy v${{ needs.validate-changelog.outputs.version_name }}
          body_path: ${{ steps.notes.outputs.github_body }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # Job 4: Notify on Failure
  # ===========================================
  notify-failure:
    name: Notify on Failure
    needs: [validate-changelog, build-release, deploy-google-play]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report Failure
        run: |
          echo "❌ Release workflow failed!"
          echo "Check the Actions tab for details."
